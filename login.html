<div class="container">

<script>
  const API_URL = 'http://localhost:3000/api';

  // Show loading state on button
  function setButtonLoading(button, loading) {
    if (loading) {
      button.disabled = true;
      button.innerHTML = 'Processing... <span class="loading"></span>';
    } else {
      button.disabled = false;
      button.innerHTML = button.getAttribute('data-original-text');
    }
  }

  // Handle Signup
  async function handleSignup() {
    const firstName = document.getElementById('signupFirstName').value.trim();
    const lastName = document.getElementById('signupLastName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const dob = document.getElementById('signupDob').value;
    const city = document.getElementById('signupCity').value.trim();
    const country = document.getElementById('signupCountry').value;
    const role = document.getElementById('signupRole').value;
    const password = document.getElementById('signupPassword').value;
    const confirmPassword = document.getElementById('signupConfirmPassword').value;
    
    const errorDiv = document.getElementById('signupError');
    const successDiv = document.getElementById('signupSuccess');
    const signupBtn = document.querySelector('#signupForm .btn-primary');
    
    // Validation
    if (!firstName || !lastName || !email || !dob || !city || !country || !role || !password) {
      errorDiv.textContent = '❌ Please fill in all fields';
      errorDiv.style.display = 'block';
      successDiv.style.display = 'none';
      return;
    }
    
    if (password !== confirmPassword) {
      errorDiv.textContent = '❌ Passwords do not match';
      errorDiv.style.display = 'block';
      return;
    }
    
    if (password.length < 6) {
      errorDiv.textContent = '❌ Password must be at least 6 characters';
      errorDiv.style.display = 'block';
      return;
    }
    
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      errorDiv.textContent = '❌ Please enter a valid email address';
      errorDiv.style.display = 'block';
      return;
    }
    
    // Store original button text
    signupBtn.setAttribute('data-original-text', signupBtn.innerHTML);
    setButtonLoading(signupBtn, true);
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    
    try {
      const response = await fetch(`${API_URL}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          firstName, lastName, email, password, dob, city, country, role
        })
      });
      
      const data = await response.json();
      
      if (response.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('currentUser', JSON.stringify(data.user));
        successDiv.textContent = '✅ Account created successfully! Redirecting...';
        successDiv.style.display = 'block';
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
      } else {
        errorDiv.textContent = data.error || 'Registration failed';
        errorDiv.style.display = 'block';
        setButtonLoading(signupBtn, false);
      }
    } catch (err) {
      errorDiv.textContent = '❌ Network error. Please check if server is running.';
      errorDiv.style.display = 'block';
      setButtonLoading(signupBtn, false);
    }
  }

  // Handle Login
  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('loginError');
    const loginBtn = document.querySelector('#loginForm .btn-primary');
    
    if (!email || !password) {
      errorDiv.textContent = '❌ Please enter email and password';
      errorDiv.style.display = 'block';
      return;
    }
    
    loginBtn.setAttribute('data-original-text', loginBtn.innerHTML);
    setButtonLoading(loginBtn, true);
    errorDiv.style.display = 'none';
    
    try {
      const response = await fetch(`${API_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      
      const data = await response.json();
      
      if (response.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('currentUser', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } else {
        errorDiv.textContent = data.error || 'Invalid credentials';
        errorDiv.style.display = 'block';
        setButtonLoading(loginBtn, false);
      }
    } catch (err) {
      errorDiv.textContent = '❌ Network error. Please check if server is running.';
      errorDiv.style.display = 'block';
      setButtonLoading(loginBtn, false);
    }
  }

  // Tab switching
  function switchToSignup() {
    document.querySelector('.tab-btn[data-form="signup"]').click();
  }
  
  function switchToLogin() {
    document.querySelector('.tab-btn[data-form="login"]').click();
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const formId = btn.getAttribute('data-form');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active-form'));
      document.getElementById(formId + 'Form').classList.add('active-form');
      
      // Clear errors when switching tabs
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('signupError').style.display = 'none';
      document.getElementById('signupSuccess').style.display = 'none';
    });
  });

  // Check if already logged in
  if (localStorage.getItem('currentUser') && localStorage.getItem('token')) {
    window.location.href = 'index.html';
  }
  
  // Add enter key support
  document.getElementById('loginPassword')?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('signupConfirmPassword')?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleSignup();
  });
</script>
</body>
